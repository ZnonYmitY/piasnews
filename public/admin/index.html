<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>Piasnews 历史审核台</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-bar">
      <div class="brand-block">
        <p class="eyebrow">PIASNEWS</p>
        <h1>历史审核台</h1>
      </div>
      <div class="app-actions">
        <span class="connection-state" id="connectionState">未连接审核接口</span>
        <button class="button button-quiet" id="refreshButton" type="button">刷新</button>
        <button class="button button-dark" id="settingsButton" type="button">连接设置</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="queue-panel" aria-label="候选事件队列">
        <div class="queue-heading">
          <div>
            <p class="section-label">审核队列</p>
            <p class="queue-updated" id="queueUpdated">正在读取...</p>
          </div>
          <span class="pending-count" id="pendingCount">0 待审</span>
        </div>

        <div class="filters" role="tablist" aria-label="审核状态筛选">
          <button class="filter is-active" data-filter="pending" type="button">待审</button>
          <button class="filter" data-filter="approved" type="button">已通过</button>
          <button class="filter" data-filter="rejected" type="button">已拒绝</button>
          <button class="filter" data-filter="all" type="button">全部</button>
        </div>

        <div class="candidate-list" id="candidateList" aria-live="polite"></div>
      </aside>

      <section class="editor-panel" aria-label="候选事件审核">
        <div class="empty-state" id="emptyState">
          <p class="empty-title">选择一条候选事件</p>
          <p>待审事件的事实、热度和语义标签会在这里展开。</p>
        </div>

        <form id="reviewForm" hidden>
          <header class="editor-heading">
            <div>
              <div class="editor-meta-row">
                <span class="status-badge" id="statusBadge">待审</span>
                <span id="candidateScore">候选分 0</span>
              </div>
              <h2 id="editorTitle">候选事件</h2>
              <p class="editor-signals" id="editorSignals"></p>
            </div>
            <a class="source-link" id="sourceLink" href="#" target="_blank" rel="noreferrer">查看原始来源</a>
          </header>

          <fieldset class="form-section">
            <legend>事件事实</legend>
            <div class="field-grid field-grid-two">
              <label class="field field-wide">
                <span>标题</span>
                <input id="titleInput" name="title" required maxlength="300">
              </label>
              <label class="field">
                <span>事件日期</span>
                <input id="dateInput" name="date" type="date" required>
              </label>
              <label class="field">
                <span>事件类型</span>
                <select id="typeInput" name="type">
                  <option value="race_win">大奖赛胜利</option>
                  <option value="career_milestone">生涯里程碑</option>
                  <option value="career_turning_point">生涯转折</option>
                  <option value="contract">合同</option>
                  <option value="team">车队事件</option>
                  <option value="social_moment">社媒名场面</option>
                  <option value="other">其他</option>
                </select>
              </label>
              <label class="field field-wide">
                <span>摘要</span>
                <textarea id="summaryInput" name="summary" rows="3" required maxlength="1200"></textarea>
              </label>
              <label class="field">
                <span>来源名称</span>
                <input id="sourceInput" name="source" required maxlength="160">
              </label>
              <label class="field">
                <span>来源链接</span>
                <input id="urlInput" name="url" type="url" required>
              </label>
            </div>
          </fieldset>

          <fieldset class="form-section">
            <legend>历史价值评分</legend>
            <div class="score-grid">
              <label class="score-field">
                <span>总体历史价值</span>
                <input type="range" min="0" max="100" value="70" data-score-range="historical_value">
                <input type="number" min="0" max="100" placeholder="--" data-score-number="historical_value">
              </label>
              <label class="score-field">
                <span>当时关注度</span>
                <input type="range" min="0" max="100" value="70" data-score-range="peak_attention">
                <input type="number" min="0" max="100" placeholder="--" data-score-number="peak_attention">
              </label>
              <label class="score-field">
                <span>长期影响</span>
                <input type="range" min="0" max="100" value="70" data-score-range="lasting_significance">
                <input type="number" min="0" max="100" placeholder="--" data-score-number="lasting_significance">
              </label>
              <label class="score-field">
                <span>生涯影响</span>
                <input type="range" min="0" max="100" value="70" data-score-range="career_impact">
                <input type="number" min="0" max="100" placeholder="--" data-score-number="career_impact">
              </label>
              <label class="score-field">
                <span>车迷辨识度</span>
                <input type="range" min="0" max="100" value="70" data-score-range="fan_recognition">
                <input type="number" min="0" max="100" placeholder="--" data-score-number="fan_recognition">
              </label>
            </div>
          </fieldset>

          <fieldset class="form-section">
            <legend>语义标注</legend>
            <div class="field-grid field-grid-two">
              <label class="field field-wide">
                <span>入选理由</span>
                <textarea id="reasonInput" rows="2" required maxlength="1200"></textarea>
              </label>
              <label class="field">
                <span>主题，使用逗号分隔</span>
                <input id="themesInput" maxlength="800">
              </label>
              <label class="field">
                <span>强语义键，使用逗号分隔</span>
                <input id="strongKeysInput" required maxlength="800">
              </label>
              <label class="field field-wide">
                <span>向量文本</span>
                <textarea id="embeddingTextInput" rows="3" required maxlength="1600"></textarea>
              </label>
              <label class="field field-wide">
                <span>标签，使用逗号分隔</span>
                <input id="tagsInput" maxlength="800">
              </label>
              <label class="field field-wide">
                <span>审核备注</span>
                <textarea id="decisionReasonInput" rows="2" maxlength="1200"></textarea>
              </label>
            </div>
          </fieldset>

          <footer class="review-actions">
            <p id="actionHint">批准后将由 GitHub Actions 校验并写入正式历史库。</p>
            <div>
              <button class="button button-danger" id="rejectButton" type="button">拒绝</button>
              <button class="button button-primary" id="approveButton" type="submit">批准并入库</button>
            </div>
          </footer>
        </form>
      </section>
    </main>

    <dialog id="settingsDialog">
      <form method="dialog" id="settingsForm">
        <header class="dialog-heading">
          <div>
            <p class="section-label">审核接口</p>
            <h2>连接设置</h2>
          </div>
          <button class="dialog-close" value="cancel" aria-label="关闭" type="submit">×</button>
        </header>
        <label class="field">
          <span>Worker URL</span>
          <input id="workerUrlInput" type="url" placeholder="https://piasnews-review.example.workers.dev" required>
        </label>
        <label class="field">
          <span>管理员密钥</span>
          <input id="adminKeyInput" type="password" autocomplete="off" required>
        </label>
        <p class="dialog-note">URL 保存在本机；管理员密钥只保留到当前浏览器会话结束。</p>
        <footer class="dialog-actions">
          <button class="button button-quiet" value="cancel" type="submit">取消</button>
          <button class="button button-dark" id="saveSettingsButton" value="default" type="button">保存连接</button>
        </footer>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js" defer></script>
  </body>
</html>
