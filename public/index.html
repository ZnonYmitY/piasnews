<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Piasnews Data</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 40px 24px;
        line-height: 1.5;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }

      p {
        margin: 0 0 20px;
      }

      ul {
        padding-left: 22px;
      }

      code {
        font-size: 0.95em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Piasnews Data</h1>
      <p>Static Oscar Piastri news data for the latest 3-day window.</p>
      <ul>
        <li><a href="data/items.json"><code>data/items.json</code></a> - normalized news items</li>
        <li><a href="data/daily.json"><code>data/daily.json</code></a> - daily counts and breakdowns</li>
        <li><a href="data/rss.xml"><code>data/rss.xml</code></a> - RSS feed</li>
        <li><a href="data/history.json"><code>data/history.json</code></a> - maintained historical events</li>
      </ul>
      <p>Repository: <a href="https://github.com/ZnonYmitY/piasnews">github.com/ZnonYmitY/piasnews</a></p>
    </main>
  </body>
</html>
