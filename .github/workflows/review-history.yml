name: Review Piasnews History

on:
  workflow_dispatch:
    inputs:
      candidate_id:
        description: Candidate event ID
        required: true
        type: string
      decision:
        description: Review decision
        required: true
        type: choice
        options:
          - approve
          - reject
      review_payload_b64:
        description: URL-safe base64 encoded review payload
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: piasnews-write
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Apply review decision
        env:
          CANDIDATE_ID: ${{ inputs.candidate_id }}
          REVIEW_DECISION: ${{ inputs.decision }}
          REVIEW_PAYLOAD_B64: ${{ inputs.review_payload_b64 }}
          REVIEWER: ${{ github.actor }}
        run: |
          python scripts/review_history.py \
            --candidate-id "$CANDIDATE_ID" \
            --decision "$REVIEW_DECISION" \
            --payload-b64 "$REVIEW_PAYLOAD_B64" \
            --reviewer "$REVIEWER"

      - name: Validate history workflow data
        run: python scripts/validate_history.py

      - name: Commit review decision
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.json data/history-candidates.json
          git commit -m "Review Piasnews history candidate"
          git push

      - name: Prepare Pages artifact
        env:
          PIASNEWS_WORKER_URL: ${{ vars.PIASNEWS_WORKER_URL }}
        run: |
          mkdir -p public/data
          cp data/items.json data/daily.json data/rss.xml data/calendar.json data/next-race.ics data/next-weekend.ics data/full-season.ics data/social.json data/history.json data/history-candidates.json public/data/
          cp data/translation_candidates.csv public/data/translation_candidates.csv
          cp data/translation_candidates_latest.csv public/data/translation_candidates_latest.csv
          cp data/translation_candidates_latest.xlsx public/data/translation_candidates_latest.xlsx
          cp piasnews/references/history-retrieval.json public/data/history-retrieval.json
          python scripts/write_runtime_config.py --output public/data/runtime-config.json
          touch public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
