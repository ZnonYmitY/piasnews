name: Update Piasnews Data

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: piasnews-write
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch latest Piasnews data
        run: python scripts/fetch_piasnews.py --days 3 --output-dir data

      - name: Fetch Formula 1 calendar
        run: python scripts/fetch_f1_calendar.py --output data/calendar.json

      - name: Fetch optional X and Instagram social data
        env:
          PIASNEWS_X_BEARER_TOKEN: ${{ secrets.PIASNEWS_X_BEARER_TOKEN }}
        run: python scripts/fetch_social_sources.py --days 3 --output data/social.json

      - name: Build history-review candidates
        run: python scripts/build_history_candidates.py

      - name: Validate history knowledge base
        run: python scripts/validate_history.py

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/items.json data/daily.json data/rss.xml data/calendar.json data/social.json data/history-candidates.json
          if git diff --cached --quiet; then
            echo "No Piasnews data changes."
          else
            git commit -m "Update Piasnews data"
            git push
          fi

      - name: Prepare Pages artifact
        env:
          PIASNEWS_WORKER_URL: ${{ vars.PIASNEWS_WORKER_URL }}
        run: |
          mkdir -p public/data
          cp data/items.json data/daily.json data/rss.xml data/calendar.json data/social.json data/history.json data/history-candidates.json public/data/
          cp piasnews/references/history-retrieval.json public/data/history-retrieval.json
          python scripts/write_runtime_config.py --output public/data/runtime-config.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
