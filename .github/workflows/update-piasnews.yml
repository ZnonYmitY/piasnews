name: Update Piasnews Data

on:
  schedule:
    - cron: "17 */6 * * *"
    - cron: "27 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: piasnews-write
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch latest Piasnews data
        run: python scripts/fetch_piasnews.py --days 3 --output-dir data

      - name: Fetch Formula 1 calendar
        run: python scripts/fetch_f1_calendar.py --output data/calendar.json

      - name: Build Formula 1 calendar files
        run: python scripts/build_f1_calendar_ics.py --calendar data/calendar.json --race-output data/next-race.ics --weekend-output data/next-weekend.ics

      - name: Fetch optional X and Instagram social data
        env:
          PIASNEWS_X_BEARER_TOKEN: ${{ secrets.PIASNEWS_X_BEARER_TOKEN }}
          PIASNEWS_SOCIAL_INPUT_JSON: ${{ vars.PIASNEWS_SOCIAL_INPUT_JSON }}
        run: python scripts/fetch_social_sources.py --days 3 --output data/social.json

      - name: Apply Immersive Translate mappings
        run: python scripts/apply_immersive_translations.py --mapping data/immersive_translations.zh.json --items data/items.json --social data/social.json

      - name: Audit translation badcases
        run: |
          python scripts/audit_translations.py \
            --items data/items.json \
            --social data/social.json \
            --review /tmp/piasnews-no-production-review.csv \
            --candidates data/translation_candidates.csv \
            --latest-csv data/translation_candidates_latest.csv \
            --latest-xlsx data/translation_candidates_latest.xlsx

      - name: Sync translation badcases to Feishu Base
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BASE_APP_TOKEN: ${{ secrets.FEISHU_BASE_APP_TOKEN }}
          FEISHU_BASE_TABLE_ID: ${{ secrets.FEISHU_BASE_TABLE_ID }}
        run: python scripts/sync_feishu_translation_base.py --input-csv data/translation_candidates.csv --mark-missing-ignored

      - name: Upload translation badcase Excel
        uses: actions/upload-artifact@v4
        with:
          name: piasnews-translation-badcase-candidates
          path: |
            data/translation_candidates_latest.csv
            data/translation_candidates_latest.xlsx

      - name: Build history-review candidates
        run: python scripts/build_history_candidates.py

      - name: Validate history knowledge base
        run: python scripts/validate_history.py

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/items.json data/daily.json data/rss.xml data/calendar.json data/next-race.ics data/next-weekend.ics data/social.json data/immersive_translations.zh.json data/history-candidates.json data/translation_candidates.csv
          if git diff --cached --quiet; then
            echo "No Piasnews data changes."
          else
            git commit -m "Update Piasnews data"
            git push
          fi

      - name: Prepare Pages artifact
        env:
          PIASNEWS_WORKER_URL: ${{ vars.PIASNEWS_WORKER_URL }}
        run: |
          mkdir -p public/data
          cp data/items.json data/daily.json data/rss.xml data/calendar.json data/next-race.ics data/next-weekend.ics data/social.json data/history.json data/history-candidates.json public/data/
          cp data/translation_candidates.csv public/data/translation_candidates.csv
          cp data/translation_candidates_latest.csv public/data/translation_candidates_latest.csv
          cp data/translation_candidates_latest.xlsx public/data/translation_candidates_latest.xlsx
          cp piasnews/references/history-retrieval.json public/data/history-retrieval.json
          python scripts/write_runtime_config.py --output public/data/runtime-config.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Feishu translation badcases
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_BASE_URL: ${{ vars.FEISHU_BASE_URL }}
          PIASNEWS_PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: python scripts/notify_feishu_badcases.py --latest-csv data/translation_candidates_latest.csv
