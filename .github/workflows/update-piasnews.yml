name: Update Piasnews Data

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch latest Piasnews data
        run: python scripts/fetch_piasnews.py --days 3 --output-dir data

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/items.json data/daily.json data/rss.xml
          if git diff --cached --quiet; then
            echo "No Piasnews data changes."
          else
            git commit -m "Update Piasnews data"
            git push
          fi
